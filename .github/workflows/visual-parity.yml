name: Visual Parity

on:
  pull_request:
    paths:
      - 'apps/storybook/**'
      - 'scripts/visual/**'
      - 'tests/visual/**'
      - 'artifacts/figma-baselines/**'
      - 'playwright.visual.config.ts'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/visual-parity.yml'
  workflow_dispatch:

jobs:
  visual-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      STORYBOOK_URL: http://127.0.0.1:6006

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Optionally refresh baselines from Figma
        if: ${{ secrets.FIGMA_TOKEN != '' && secrets.FIGMA_FILE_KEY != '' }}
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: pnpm visual:baseline

      - name: Build Storybook
        run: pnpm --filter storybook build

      - name: Serve Storybook
        run: |
          npx http-server apps/storybook/storybook-static -p 6006 > /tmp/storybook.log 2>&1 &
          npx wait-on http://127.0.0.1:6006

      - name: Capture Storybook screenshots
        run: pnpm visual:test

      - name: Compare screenshots against Figma baselines
        run: pnpm visual:report

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-parity-artifacts
          path: |
            artifacts/visual-diff-report.md
            artifacts/visual-diff-report.json
            artifacts/storybook-captures
            artifacts/visual-diffs
            artifacts/playwright-report
