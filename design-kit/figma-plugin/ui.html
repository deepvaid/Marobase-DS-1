<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: 12px;
      background: #F9FAFB;
      color: #111928;
      padding: 12px;
      width: 240px;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #111928;
    }
    p.sub {
      font-size: 11px;
      color: #6B7280;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .section {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .section h3 {
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    button {
      display: block;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      background: #1A56DB;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    button:last-child { margin-bottom: 0; }
    button:hover { background: #1447B8; }
    button.secondary {
      background: #F3F4F6;
      color: #374151;
      border: 1px solid #E5E7EB;
    }
    button.secondary:hover { background: #E5E7EB; }
    #log {
      margin-top: 8px;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 8px;
      font-size: 10px;
      color: #374151;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #log.hidden { display: none; }
    .success { color: #0E9F6E; }
    .error   { color: #E02424; }
    .info    { color: #1A56DB; }
  </style>
</head>
<body>
  <h2>Maropost Design Kit</h2>
  <p class="sub">Populate your Figma file with color styles, text styles, and component spec frames.</p>

  <div class="section">
    <h3>Variables</h3>
    <button id="btn-import-variables">Import Variables (64 tokens)</button>
  </div>

  <div class="section">
    <h3>Styles</h3>
    <button id="btn-color-styles">Create Color Styles</button>
    <button id="btn-text-styles">Create Text Styles</button>
  </div>

  <div class="section">
    <h3>Components</h3>
    <button id="btn-component-frames">Create Component Frames</button>
    <button class="secondary" id="btn-log-nodeids">Log Frame Node IDs</button>
  </div>

  <div id="log" class="hidden"></div>

  <script>
    const log = document.getElementById('log')

    function appendLog(msg, type = '') {
      log.classList.remove('hidden')
      const span = document.createElement('span')
      span.className = type
      span.textContent = msg + '\n'
      log.appendChild(span)
      log.scrollTop = log.scrollHeight
    }

    function send(type) {
      parent.postMessage({ pluginMessage: { type } }, '*')
    }

    document.getElementById('btn-import-variables').onclick = () => { appendLog('Importing 64 variables…', 'info'); send('import-variables') }
    document.getElementById('btn-color-styles').onclick  = () => { appendLog('Creating color styles…', 'info'); send('create-color-styles') }
    document.getElementById('btn-text-styles').onclick   = () => { appendLog('Creating text styles…',  'info'); send('create-text-styles') }
    document.getElementById('btn-component-frames').onclick = () => { appendLog('Creating component frames…', 'info'); send('create-component-frames') }
    document.getElementById('btn-log-nodeids').onclick   = () => send('log-node-ids')

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage
      if (!msg) return
      if (msg.type === 'log') appendLog(msg.text, msg.level || '')
      if (msg.type === 'done') appendLog('✓ Done: ' + msg.action, 'success')
      if (msg.type === 'error') appendLog('✗ ' + msg.text, 'error')
      if (msg.type === 'node-ids') {
        appendLog('--- Component Node IDs ---', 'info')
        Object.entries(msg.ids).forEach(([name, id]) => {
          appendLog(`${name}: ${id}`)
        })
        appendLog('Copy these into figma.config.ts → figmaNodeUrl', 'info')
      }
    }
  </script>
</body>
</html>
